trigger: none

parameters:
  - name: environment
    displayName: 'Target Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - prod
  - name: iacTool
    displayName: 'IaC Tool'
    type: string
    default: 'bicep'
    values:
      - bicep
      - terraform

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    jobs:
      - job: BuildAndTest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: 'Install dependencies'
          - script: npm test
            displayName: 'Test'
          - script: npm run build
            displayName: 'Build'
          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/deploy.zip'
          - publish: $(Build.ArtifactStagingDirectory)/deploy.zip
            artifact: deploy

  - stage: Deploy
    dependsOn: Build
    jobs:
      - deployment: DeployToAzure
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  condition: eq('${{ parameters.iacTool }}', 'bicep')
                  inputs:
                    azureSubscription: 'AzureServiceConnection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az deployment group create \
                        --resource-group rg-mcvone-${{ parameters.environment }} \
                        --template-file infra/bicep/main.bicep \
                        --parameters infra/bicep/parameters/${{ parameters.environment }}.bicepparam \
                        --parameters mimecastClientId=$(MIMECAST_CLIENT_ID) \
                                     mimecastClientSecret=$(MIMECAST_CLIENT_SECRET) \
                                     visionOneIngestToken=$(VISIONONE_INGEST_TOKEN)
                  displayName: 'Deploy Bicep'

                - task: AzureFunctionApp@2
                  inputs:
                    azureSubscription: 'AzureServiceConnection'
                    appType: 'functionApp'
                    appName: 'mcvone${{ parameters.environment }}-func'
                    package: '$(Pipeline.Workspace)/deploy/deploy.zip'
                  displayName: 'Deploy Function App'
